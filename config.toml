base_url = "https://xificurc.github.io"
title = "Incomplete Thought"
author = "Peter Nagy"
theme = "zola-bearblog"
generate_feeds = true
feed_filenames = ["atom.xml"]
compile_sass = false
build_search_index = false

taxonomies = [
  { name = "tags", feed = false },
]

default_language = "en"

[translations]
no_posts = "No posts yet"
remove_filter = "Remove filter"
filtering_for = "Filtering for"
made_with = "Made with"
table_of_contents = "Table of contents"
language = "language"
site = "site"

[markdown]
insert_anchor_links = "heading"

[markdown.highlighting]
style = "class"
light_theme = "github-light"
dark_theme = "github-dark"

[extra]
date_format = "%Y-%m-%d"
hide_made_with_line = true

[[extra.main_menu]]
name = "Blog"
url = "@/blog/_index.md"
